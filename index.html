<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🥜 Орешкометр — поиск БигБоба через камеру 📷💥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #2a4720, #173012);
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .detector-card {
            background: #2d2418dd;
            backdrop-filter: blur(6px);
            border-radius: 48px;
            padding: 20px 20px 25px;
            max-width: 780px;
            width: 100%;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 3px #ffdd99;
            border: 2px solid #e5a440;
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            color: #ffdd99;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            text-shadow: 2px 2px 0 #5a3a1a;
        }

        .sub {
            text-align: center;
            background: #00000066;
            border-radius: 50px;
            padding: 6px 15px;
            display: inline-block;
            width: auto;
            margin: 0 auto 15px;
            color: #ffeecc;
            font-size: 0.85rem;
        }

        /* контейнер камеры */
        .camera-box {
            position: relative;
            border-radius: 36px;
            overflow: hidden;
            background: #000;
            margin: 10px 0 15px;
            box-shadow: 0 0 0 4px #f5bc70, 0 15px 25px black;
        }

        video, canvas {
            width: 100%;
            display: block;
            border-radius: 32px;
            transform: scaleX(-1); /* зеркалим для удобства */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* перекрестие / рамка детектора */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 70px;
            height: 70px;
            transform: translate(-50%, -50%);
            border: 3px solid #ffcc44;
            border-radius: 50%;
            box-shadow: 0 0 0 2px black, 0 0 0 5px rgba(255,200,0,0.6);
            pointer-events: none;
            z-index: 10;
        }
        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: #ffcc44;
        }
        .crosshair::before {
            top: 50%;
            left: -12px;
            width: 22px;
            height: 3px;
            transform: translateY(-50%);
        }
        .crosshair::after {
            top: -12px;
            left: 50%;
            width: 3px;
            height: 22px;
            transform: translateX(-50%);
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background: #1e1910aa;
            padding: 12px 18px;
            border-radius: 60px;
            margin-top: 12px;
        }

        .counter {
            background: #372d1c;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.5rem;
            color: #ffd98c;
        }

        .status {
            background: #00000099;
            padding: 6px 14px;
            border-radius: 40px;
            color: #ffdead;
            font-family: monospace;
            font-weight: bold;
        }

        button {
            background: radial-gradient(circle at 30% 20%, #f5b642, #c46a1a);
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 5px 0 #6e3c12;
            transition: 0.05s linear;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #6e3c12;
        }

        .info {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 16px;
            color: #ffeaac;
        }

        @media (max-width: 600px) {
            .crosshair { width: 55px; height: 55px; }
            .counter { font-size: 1.2rem; }
            button { font-size: 0.9rem; padding: 6px 14px; }
        }
    </style>
</head>
<body>
<div class="detector-card">
    <h1>
        📡🥜 ОРЕШКОМЕТР (камера-радар)
        <span>🔍</span>
    </h1>
    <div style="text-align: center">
        <div class="sub">🎥 НАВЕДИ НА ОРЕШЕК "БИГБОБ" — БУДЕТ ВЗРЫВ И ЗВУК! 💥</div>
    </div>

    <div class="camera-box">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvasOverlay"></canvas>
        <div class="crosshair"></div>
    </div>

    <div class="dashboard">
        <div class="counter">🏆 НАЙДЕНО: <span id="bigbobCount">0</span></div>
        <div class="status" id="detectStatus">🤖 СКАНИРУЮ...</div>
        <button id="resetBtn">🔄 СБРОС СЧЁТЧИКА</button>
    </div>
    <div class="info">
        💡 Совмести перекрестие с орехом (круглый, коричневый/бежевый) — детектор сработает!<br>
        ⚠️ Нужно хорошее освещение, орех должен быть в центре рамки.
    </div>
</div>

<script>
    (function() {
        // DOM элементы
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvasOverlay');
        const ctx = canvas.getContext('2d');
        const bigbobCountSpan = document.getElementById('bigbobCount');
        const detectStatusSpan = document.getElementById('detectStatus');
        const resetBtn = document.getElementById('resetBtn');

        let foundCount = 0;
        let detectionCooldown = false;      // защита от повторных взрывов
        let animationFrameId = null;
        let stream = null;

        // параметры для цветовой детекции (орех – коричневые, золотистые, бежевые оттенки)
        // диапазоны HSV (будем преобразовывать RGB в HSV вручную)
        // примерные границы для орехов: H 5-25 (оранжево-коричневый) и 0-10? также светлые бежевые
        // упростим: проверяем цвет в центре креста (круглая область) на "ореховость"

        // Функция RGB -> HSV
        function rgbToHsv(r, g, b) {
            r /= 255, g /= 255, b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, v = max;
            const d = max - min;
            s = max === 0 ? 0 : d / max;
            if (max === min) h = 0;
            else {
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [h * 360, s, v];
        }

        // Является ли цвет "ореховым" (коричневый, бежевый, золотистый)
        function isNutColor(r, g, b) {
            const [h, s, v] = rgbToHsv(r, g, b);
            // Ореховые оттенки: H от 5 до 35 градусов (оранжево-коричневый, желто-коричневый)
            // плюс более насыщенные коричневые до 40, и светлые бежевые
            const hueOk = (h >= 5 && h <= 40) || (h >= 0 && h <= 10 && s < 0.7); // захват светлых тонов
            const saturationOk = s > 0.2 && s < 0.85; // не слишком бледный и не слишком яркий
            const valueOk = v > 0.35 && v < 0.95;
            // дополнительно тёмно-коричневые допускаем
            const darkBrown = (h >= 10 && h <= 35 && s > 0.5 && v > 0.3 && v < 0.65);
            return (hueOk && saturationOk && valueOk) || darkBrown;
        }

        // Анализ области в центре (круг радиуса radius)
        // Определяем, похоже ли содержимое на орех (по цвету и форме)
        function detectNutInCenter(videoElem, radius = 32) {
            if (!videoElem.videoWidth || !videoElem.videoHeight) return false;
            // Обновляем размер canvas под видео
            if (canvas.width !== videoElem.videoWidth || canvas.height !== videoElem.videoHeight) {
                canvas.width = videoElem.videoWidth;
                canvas.height = videoElem.videoHeight;
            }
            ctx.drawImage(videoElem, 0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Собираем пиксели в круглой области
            let totalPixels = 0;
            let nutColorPixels = 0;
            
            // анализируем квадрат, описанный вокруг круга, для скорости
            const startX = Math.max(0, centerX - radius);
            const startY = Math.max(0, centerY - radius);
            const endX = Math.min(canvas.width, centerX + radius);
            const endY = Math.min(canvas.height, centerY + radius);
            
            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    if (dx*dx + dy*dy <= radius*radius) {
                        totalPixels++;
                        const pixel = ctx.getImageData(x, y, 1, 1).data;
                        const r = pixel[0], g = pixel[1], b = pixel[2];
                        if (isNutColor(r, g, b)) {
                            nutColorPixels++;
                        }
                    }
                }
            }
            
            if (totalPixels === 0) return false;
            const ratio = nutColorPixels / totalPixels;
            // Если более 40% пикселей в круге имеют "ореховый" цвет — считаем, что орех найден
            // Это достаточно надежно для круглых орешков
            return ratio > 0.42;
        }

        // Эффект взрыва + звук + увеличение счётчика
        function triggerBigbobFound() {
            if (detectionCooldown) return;
            detectionCooldown = true;
            
            // Увеличиваем счётчик
            foundCount++;
            bigbobCountSpan.innerText = foundCount;
            detectStatusSpan.innerHTML = "💥 БАХ! НАЙДЕН БИГБОБ! 💥";
            
            // Визуальный эффект взрыва на экране (вспышка)
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.backgroundColor = 'rgba(255, 180, 40, 0.8)';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '9999';
            flash.style.transition = 'opacity 0.2s';
            document.body.appendChild(flash);
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 300);
            }, 80);
            
            // Добавим частицы взрыва в центре камеры
            const camBox = document.querySelector('.camera-box');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.textContent = ['💥','🔥','✨','🌰','🥜','💢'][Math.floor(Math.random()*6)];
                particle.style.position = 'absolute';
                particle.style.left = '50%';
                particle.style.top = '50%';
                particle.style.fontSize = (20 + Math.random() * 30) + 'px';
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '10000';
                particle.style.transform = 'translate(-50%, -50%)';
                particle.style.transition = 'all 0.5s ease-out';
                camBox.appendChild(particle);
                const angle = Math.random() * Math.PI * 2;
                const dist = 60 + Math.random() * 100;
                const dx = Math.cos(angle) * dist;
                const dy = Math.sin(angle) * dist;
                setTimeout(() => {
                    particle.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    particle.style.opacity = '0';
                }, 10);
                setTimeout(() => particle.remove(), 550);
            }
            
            // звук! "ОРЕШКЭЭ БИГБОББ"
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance("ОРЕШКЭЭ БИГБОББ");
                utterance.lang = "ru-RU";
                utterance.rate = 0.85;
                utterance.pitch = 1.2;
                utterance.volume = 1;
                window.speechSynthesis.speak(utterance);
            } else {
                // fallback писк
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 880;
                    gain.gain.value = 0.4;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
                    osc.stop(audioCtx.currentTime + 0.8);
                } catch(e) {}
            }
            
            // Сброс кулдауна через 2 секунды, чтобы не было спама
            setTimeout(() => {
                detectionCooldown = false;
                detectStatusSpan.innerHTML = "🔍 ОРЕШКОМЕТР АКТИВЕН";
            }, 2000);
        }

        // Цикл анализа видеопотока
        function analyzeFrame() {
            if (!video.videoWidth || video.videoWidth === 0) {
                requestAnimationFrame(analyzeFrame);
                return;
            }
            
            const nutDetected = detectNutInCenter(video, 42); // радиус 42 пикселя
            if (nutDetected && !detectionCooldown) {
                triggerBigbobFound();
            } else if (!detectionCooldown) {
                // обновляем статус (не спамим)
                if (!detectStatusSpan.innerHTML.includes("АКТИВЕН")) {
                    detectStatusSpan.innerHTML = "🎯 ИЩУ ОРЕШЕК... наведи в центр";
                }
            }
            
            requestAnimationFrame(analyzeFrame);
        }

        // Инициализация камеры
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                await video.play();
                // после запуска запускаем анализ
                requestAnimationFrame(analyzeFrame);
            } catch (err) {
                console.error("Ошибка камеры", err);
                detectStatusSpan.innerHTML = "❌ НЕТ ДОСТУПА К КАМЕРЕ!";
                alert("Не удалось получить доступ к камере. Проверьте разрешения и используйте HTTPS.");
            }
        }

        // Сброс счётчика (не сбрасывает кулдаун)
        function resetCounter() {
            foundCount = 0;
            bigbobCountSpan.innerText = "0";
            detectStatusSpan.innerHTML = "🔄 СЧЁТЧИК СБРОШЕН";
            setTimeout(() => {
                if (!detectionCooldown) detectStatusSpan.innerHTML = "🔍 ОРЕШКОМЕТР АКТИВЕН";
            }, 1500);
        }

        // очистка при выходе
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
        });

        resetBtn.addEventListener('click', resetCounter);
        initCamera();
    })();
</script>
</body>
</html>
