<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🥜 Орешкометр — настоящий детектор орехов БигБоб</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #1e3a1a;
            font-family: 'Segoe UI', system-ui;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: #2d2418dd;
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 35px black;
            border: 2px solid goldenrod;
        }

        h1 {
            text-align: center;
            color: #ffcd94;
            font-size: 1.7rem;
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .camera-area {
            position: relative;
            border-radius: 32px;
            overflow: hidden;
            margin: 15px 0;
            background: #000;
            box-shadow: 0 0 0 3px #f5bc70;
        }

        video, canvas {
            width: 100%;
            display: block;
            transform: scaleX(-1);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 3px solid #ffcc44;
            box-shadow: 0 0 0 2px black, 0 0 0 5px rgba(255,200,0,0.5);
            pointer-events: none;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background: #1f1a0eaa;
            padding: 12px 16px;
            border-radius: 50px;
            margin-top: 12px;
        }

        .counter {
            background: #2b2111;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.5rem;
            color: #ffd966;
        }

        .status {
            background: #00000099;
            padding: 6px 14px;
            border-radius: 40px;
            color: #ffeecc;
            font-family: monospace;
        }

        button {
            background: #ffaa33;
            border: none;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 0 #7a4316;
            transition: 0.05s linear;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7a4316;
        }

        .debug-info {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 12px;
            color: #ddbb88;
            background: #00000066;
            border-radius: 24px;
            padding: 6px;
        }

        .instruction {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 10px;
            color: #ffecb3;
            background: #3a2d1eb3;
            border-radius: 30px;
            padding: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧲🥜 ОРЕШКОМЕТР <span style="font-size:1.3rem">(детектор формы)</span></h1>
    <div class="instruction">
        🎯 НАВЕДИ НА ОРЕХ (круглый, коричневый). <br>
        👆 КОСНИСЬ ЭКРАНА, ЧТОБЫ ВКЛЮЧИТЬ ЗВУК!
    </div>

    <div class="camera-area">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlayCanvas"></canvas>
        <div class="crosshair"></div>
    </div>

    <div class="dashboard">
        <div class="counter">🏆 <span id="count">0</span></div>
        <div class="status" id="statusText">🔍 Жду орех...</div>
        <button id="resetBtn">🔄 Сброс</button>
    </div>
    <div class="debug-info" id="debugMsg">
        📡 Анализ: наведи орех в круг
    </div>
</div>

<script>
    (function() {
        // --- DOM элементы ---
        const video = document.getElementById('video');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const ctx = overlayCanvas.getContext('2d');
        const countSpan = document.getElementById('count');
        const statusDiv = document.getElementById('statusText');
        const debugSpan = document.getElementById('debugMsg');
        const resetBtn = document.getElementById('resetBtn');

        let foundCount = 0;
        let cooldown = false;
        let soundEnabled = false;
        let audioCtx = null;

        // --- Функция определения: является ли область в центре круглым орехом ---
        // Возвращает { isNut, confidence, reason }
        function detectNutShape(videoElem, radius = 45) {
            if (!videoElem.videoWidth || videoElem.videoHeight === 0) {
                return { isNut: false, confidence: 0, reason: "Нет видео" };
            }

            // Синхронизируем canvas
            if (overlayCanvas.width !== videoElem.videoWidth) {
                overlayCanvas.width = videoElem.videoWidth;
                overlayCanvas.height = videoElem.videoHeight;
            }
            ctx.drawImage(videoElem, 0, 0, overlayCanvas.width, overlayCanvas.height);

            const centerX = overlayCanvas.width / 2;
            const centerY = overlayCanvas.height / 2;
            const r = radius;
            let totalPixels = 0;
            let nutColorPixels = 0;
            let hueSum = 0, hueCount = 0;

            // Цветовая проверка (более узкий диапазон)
            function isNutColor(r, g, b) {
                // Быстрое HSV
                let rr = r/255, gg = g/255, bb = b/255;
                let max = Math.max(rr, gg, bb), min = Math.min(rr, gg, bb);
                let h, s, v = max;
                let d = max - min;
                s = max === 0 ? 0 : d / max;
                if (max === min) h = 0;
                else {
                    if (max === rr) h = (gg - bb) / d + (gg < bb ? 6 : 0);
                    else if (max === gg) h = (bb - rr) / d + 2;
                    else h = (rr - gg) / d + 4;
                    h /= 6;
                }
                h = h * 360;
                // Ореховые оттенки: от 10 до 35 (коричневый), плюс бежевые до 45
                const hueOk = (h >= 10 && h <= 45);
                const satOk = s > 0.25 && s < 0.85;
                const valOk = v > 0.35 && v < 0.9;
                return hueOk && satOk && valOk;
            }

            // Собираем пиксели в круге
            for (let y = centerY - r; y <= centerY + r; y++) {
                for (let x = centerX - r; x <= centerX + r; x++) {
                    if (x < 0 || y < 0 || x >= overlayCanvas.width || y >= overlayCanvas.height) continue;
                    const dx = x - centerX;
                    const dy = y - centerY;
                    if (dx*dx + dy*dy <= r*r) {
                        totalPixels++;
                        const pixel = ctx.getImageData(x, y, 1, 1).data;
                        const [R,G,B] = [pixel[0], pixel[1], pixel[2]];
                        if (isNutColor(R,G,B)) {
                            nutColorPixels++;
                            // Собираем оттенки для проверки однородности
                            const hsv = rgbToHsv(R,G,B);
                            hueSum += hsv.h;
                            hueCount++;
                        }
                    }
                }
            }
            if (totalPixels === 0) return { isNut: false, confidence: 0, reason: "Нет пикселей" };
            const colorRatio = nutColorPixels / totalPixels;
            
            // Доп. проверка: если цветовой процент высокий (>35%) и при этом фон не слишком пёстрый
            // Также проверяем, что центр достаточно однороден (стандартное отклонение оттенков)
            let uniformity = 1.0;
            if (hueCount > 10) {
                let avgHue = hueSum / hueCount;
                let variance = 0;
                // заново пройтись по кругу и собрать отклонения - для простоты пропустим, ограничимся порогом.
                // Чем выше цветовой процент, тем вероятнее орех. Для стен - обычно <20%
            }
            
            const confidence = colorRatio;
            const isNut = (colorRatio > 0.35); // 35% площади в круге - орехового цвета
            let reason = `орех.пикс: ${Math.round(colorRatio*100)}%`;
            return { isNut, confidence, reason };
        }

        // утилита rgbToHsv
        function rgbToHsv(r, g, b) {
            r /= 255, g /= 255, b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, v = max;
            const d = max - min;
            s = max === 0 ? 0 : d / max;
            if (max === min) h = 0;
            else {
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: h * 360, s, v };
        }

        // --- Звук "ОРЕШКЭЭ БИГБОББ" ---
        function playBigBobSound() {
            if (!soundEnabled) {
                // пробуем разблокировать
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                return;
            }
            // SpeechSynthesis
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance("ОРЕШКЭЭ БИГБОББ");
                utterance.lang = "ru-RU";
                utterance.rate = 0.9;
                utterance.pitch = 1.2;
                utterance.volume = 1;
                window.speechSynthesis.speak(utterance);
            } else {
                // fallback beep
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = 880;
                    gain.gain.value = 0.3;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.6);
                    osc.stop(ctx.currentTime + 0.6);
                } catch(e) {}
            }
        }

        // --- Эффект взрыва (визуальный) ---
        function explode() {
            const container = document.querySelector('.camera-area');
            if (!container) return;
            // Вспышка
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = 0;
            flash.style.left = 0;
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.backgroundColor = 'rgba(255, 100, 0, 0.7)';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = 9999;
            flash.style.transition = 'opacity 0.2s';
            document.body.appendChild(flash);
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 300);
            }, 100);
            
            // Частицы
            for (let i=0; i<30; i++) {
                const p = document.createElement('div');
                p.textContent = ['💥','🌰','🥜','🔥','✨','💢'][Math.floor(Math.random()*6)];
                p.style.position = 'absolute';
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.fontSize = (20 + Math.random() * 28) + 'px';
                p.style.pointerEvents = 'none';
                p.style.zIndex = 10000;
                p.style.transform = 'translate(-50%, -50%)';
                p.style.transition = 'all 0.5s ease-out';
                container.appendChild(p);
                const angle = Math.random() * Math.PI * 2;
                const dist = 60 + Math.random() * 130;
                const dx = Math.cos(angle) * dist;
                const dy = Math.sin(angle) * dist;
                setTimeout(() => {
                    p.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    p.style.opacity = '0';
                }, 10);
                setTimeout(() => p.remove(), 550);
            }
        }

        // --- Обработка находки ---
        function onBigbobFound() {
            if (cooldown) return;
            cooldown = true;
            foundCount++;
            countSpan.innerText = foundCount;
            statusDiv.innerHTML = "💥 БАХ! БИГБОБ НАЙДЕН! 💥";
            explode();
            playBigBobSound();
            setTimeout(() => {
                cooldown = false;
                statusDiv.innerHTML = "🔍 Ищу следующий орех...";
            }, 1800);
        }

        // --- Анализ кадра (вызывается постоянно) ---
        let frameRequest;
        function analyzeLoop() {
            if (!video.videoWidth || video.videoWidth === 0) {
                frameRequest = requestAnimationFrame(analyzeLoop);
                return;
            }
            const result = detectNutShape(video, 48);
            if (result.isNut && !cooldown) {
                onBigbobFound();
                debugSpan.innerHTML = `✅ ОРЕХ! (${result.reason})`;
            } else {
                if (!cooldown) debugSpan.innerHTML = `🔎 Нет ореха (${result.reason}) | Наведи в круг`;
                else debugSpan.innerHTML = `⏳ Перезарядка...`;
            }
            frameRequest = requestAnimationFrame(analyzeLoop);
        }

        // --- Разблокировка звука по касанию экрана ---
        function unlockAudio() {
            if (soundEnabled) return;
            soundEnabled = true;
            // Инициализируем AudioContext и сразу включаем
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const emptyGain = audioCtx.createGain();
                emptyGain.connect(audioCtx.destination);
                emptyGain.gain.value = 0;
                const osc = audioCtx.createOscillator();
                osc.connect(emptyGain);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.01);
                audioCtx.resume();
            } catch(e) {}
            statusDiv.innerHTML = "🔊 ЗВУК АКТИВИРОВАН! Теперь ищи орех.";
            debugSpan.innerHTML = "✅ Звук разблокирован. Наведи орех в круг.";
            document.body.removeEventListener('touchstart', unlockAudio);
            document.body.removeEventListener('click', unlockAudio);
        }

        // --- Запуск камеры ---
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                await video.play();
                statusDiv.innerHTML = "📷 Камера работает. Коснись экрана для звука.";
                analyzeLoop();
            } catch(err) {
                console.error(err);
                statusDiv.innerHTML = "❌ Ошибка камеры";
                debugSpan.innerHTML = "Проверь разрешения и HTTPS";
            }
        }

        // --- Сброс счётчика ---
        resetBtn.addEventListener('click', () => {
            foundCount = 0;
            countSpan.innerText = "0";
            statusDiv.innerHTML = "🔄 Счётчик сброшен";
        });

        // Ждём касания для разблокировки звука
        document.body.addEventListener('touchstart', unlockAudio);
        document.body.addEventListener('click', unlockAudio);
        
        startCamera();
    })();
</script>
</body>
</html>
